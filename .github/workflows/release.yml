name: Build and Release with Python3.13

on:
  release:
    types: [published]
  push:
    tags:
      - 220*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example 220260518"
        required: true
      prerelease:
        description: "Publish as a pre-release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  init-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        shell: bash
        run: |
          items=()
          items+=('{"build": "macos", "os": "macos-latest", "arch": "aarch64"}')
          items+=('{"build": "windows", "os": "windows-latest", "arch": "x86_64"}')

          matrix="matrix=["
          for ((i=0; i<${#items[@]}; i++)); do
            matrix+=" ${items[i]}"
            if ((i != ${#items[@]}-1)); then
              matrix+=","
            fi
          done
          matrix+="]"

          echo "$matrix" >> "$GITHUB_OUTPUT"

  build-app:
    needs: init-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.init-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Set up Python environment
        run: uv sync --locked --all-extras --dev

      - name: Build macOS app
        if: ${{ matrix.build == 'macos' }}
        run: |
          version="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            version="${{ github.event.inputs.tag }}"
          fi
          uv run scripts/build.py --create-dmg --version "$version" --debug

      - name: Build Windows app
        if: ${{ matrix.build == 'windows' }}
        env:
          PYTHONIOENCODING: utf-8
        run: uv run scripts/build.py --debug --onefile

      - name: Get changelog
        id: get-changelog
        shell: bash
        run: |
          if [ ! -s changelog.md ]; then
            echo "::error file=changelog.md::changelog.md is missing or empty; release notes cannot be generated."
            exit 1
          fi

          delimiter="__MDCX_CHANGELOG_EOF__"
          {
            echo "CHANGELOG<<$delimiter"
            cat changelog.md
            echo
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release type
        id: release-type
        shell: bash
        run: |
          prerelease=false
          if [ "${{ github.event_name }}" = "release" ]; then
            prerelease="${{ github.event.release.prerelease }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            prerelease=true
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create Release - macOS
        uses: svenstaro/upload-release-action@v2
        if: ${{ matrix.build == 'macos' }}
        with:
          overwrite: true
          asset_name: MDCx-$tag-${{ matrix.build }}-${{ matrix.arch }}${{ matrix.tail }}-${{ github.sha }}.dmg
          file: dist/MDCx.dmg
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          body: ${{ steps.get-changelog.outputs.CHANGELOG }}
          tag: ${{ github.event.inputs.tag || github.ref }}

      - name: Create Release - Windows
        uses: svenstaro/upload-release-action@v2
        if: ${{ matrix.build == 'windows' }}
        with:
          overwrite: true
          asset_name: MDCx-$tag-${{ matrix.build }}-${{ matrix.arch }}${{ matrix.tail }}-${{ github.sha }}.exe
          file: dist/MDCx.exe
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          body: ${{ steps.get-changelog.outputs.CHANGELOG }}
          tag: ${{ github.event.inputs.tag || github.ref }}
